name: Update Website Thumbnail

on:
  schedule:
    # 每天 UTC 時間凌晨 0 點（台灣時間早上 8 點）自動執行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許你在 GitHub 網頁後台手動點擊按鈕觸發測試

jobs:
  update-thumbnail:
    runs-on: ubuntu-latest
    permissions:
      # 確保 GitHub Token 有寫入儲存庫的權限
      contents: write

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📸 抓取 ty-db.pages.dev 網頁縮圖
        run: |
          # 使用 npx 直接執行 pageres-cli，不需額外安裝
          # 將網站截圖為 1280x720 尺寸，裁切多餘部分，並強制覆蓋命名為 databuilder.png
          npx pageres-cli https://ty-db.pages.dev 1280x720 --crop --overwrite --filename=thumbnail

      - name: 💾 自動 Commit 並 Push 回儲存庫
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 自動更新網站縮圖 [skip ci]"
          file_pattern: databuilder.png
