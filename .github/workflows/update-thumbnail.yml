name: Update Website Thumbnail

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 💡 解法就在這裡：設定全域環境變數，強制 Actions 底層套件提早使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-thumbnail:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          # 💡 順便把我們執行截圖工具的 Node.js 版本也升級到 24 (LTS)
          node-version: '24'

      - name: 📸 抓取 ty-db.pages.dev 網頁縮圖
        run: |
          npx pageres-cli https://ty-db.pages.dev 1280x720 --crop --overwrite --filename=databuilder.png

      - name: 💾 自動 Commit 並 Push 回儲存庫
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 自動更新網站縮圖 [skip ci]"
          file_pattern: databuilder.png
