- name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📸 使用 Playwright CLI 截圖
        run: |
          # 1. 安裝 Playwright 與其依賴的瀏覽器 (比 Puppeteer 穩定很多)
          npx -y playwright@latest install --with-deps chromium

          # 2. 一行指令直接截圖，不需自己寫腳本去控制無頭瀏覽器
          npx -y playwright@latest screenshot https://ty-db.pages.dev databuilder.png --viewport-size="1280,720"
